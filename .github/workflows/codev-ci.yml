name: CO-DEV CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codev-checks:
    name: CO-DEV checks
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run structure tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\run-codev-v02-structure-tests.ps1

      - name: Run gate tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\run-codev-check-gate-tests.ps1
