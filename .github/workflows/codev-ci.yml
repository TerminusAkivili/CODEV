name: CO-DEV CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-platform:
    name: CO-DEV checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run structure tests
        shell: pwsh
        run: ./tests/run-codev-v02-structure-tests.ps1

      - name: Run gate tests
        shell: pwsh
        run: ./tests/run-codev-check-gate-tests.ps1

  windows-powershell-51:
    name: Windows PowerShell 5.1 compatibility
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run structure tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\run-codev-v02-structure-tests.ps1

      - name: Run gate tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\run-codev-check-gate-tests.ps1
