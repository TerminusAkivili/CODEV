name: CO-DEV CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cross-platform:
    name: CO-DEV checks (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run structure tests
        shell: pwsh
        run: ./tests/run-codev-v02-structure-tests.ps1

      - name: Run gate tests
        shell: pwsh
        run: ./tests/run-codev-check-gate-tests.ps1

  plugin-validation:
    name: Codex plugin manifest validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependencies
        run: python -m pip install --disable-pip-version-check "PyYAML>=6,<7"

      - name: Download official Codex plugin validator
        run: |
          curl --fail --location --silent --show-error \
            --output "$RUNNER_TEMP/validate_plugin.py" \
            "https://raw.githubusercontent.com/openai/codex/1f0566d3f59298d1bb88820a0d35294f1eeb07ea/codex-rs/skills/src/assets/samples/plugin-creator/scripts/validate_plugin.py"

      - name: Validate Codex plugin manifest
        run: python "$RUNNER_TEMP/validate_plugin.py" .

  windows-powershell-51:
    name: Windows PowerShell 5.1 compatibility
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run structure tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\run-codev-v02-structure-tests.ps1

      - name: Run gate tests
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\tests\run-codev-check-gate-tests.ps1
